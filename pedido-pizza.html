<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cardápio de Pizza</title>
  <link rel="shortcut icon" href="ca.jpg" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffffff, #f9f9f9);
      min-height: 100vh;
    }

    header {
      background-color: #000000;
      color: white;
      padding: 20px;
      font-size: 24px;
      font-weight: 600;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .btn-voltar {
      font-size: 16px;
      background-color: #ffffff;
      color: rgb(0, 0, 0);
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .btn-voltar:hover {
      background-color: #f0f0f0;
    }

    .titulo-header {
      margin: 0 auto;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .produtos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 25px;
    }

    .produto {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .produto:hover {
      transform: translateY(-5px);
    }

    .produto img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .produto h3 {
      margin: 10px 0;
      font-size: 18px;
      color: #333;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .produto p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
      min-height: 80px;
      line-height: 1.4;
    }

    .produto .preco {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 20px;
      color: #000000;
      min-height: 30px;
    }

    .produto button {
      background-color: #000000;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background-color 0.3s ease;
      margin-top: auto;
    }

    .produto button:hover {
      background-color: #333;
    }

    /* ===== MODAL ESTILOS ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      overflow-y: auto;
    }

    .modal-content {
      background-color: white;
      margin: 20px auto;
      border-radius: 12px;
      width: 90%;
      max-width: 550px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .modal-header {
      background: #000;
      color: white;
      padding: 20px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 18px;
      margin: 0;
    }

    .modal-header p {
      font-size: 13px;
      margin: 5px 0 0;
      opacity: 0.8;
    }

    .close {
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }

    .close:hover {
      opacity: 0.7;
    }

    .modal-body {
      padding: 20px 25px;
      max-height: 65vh;
      overflow-y: auto;
    }

    .opcao-grupo {
      margin-bottom: 20px;
    }

    .opcao-titulo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 15px;
    }

    .contador-opcao {
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: normal;
    }

    .obrigatorio {
      background: #000;
      color: white;
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 10px;
    }

    .sabor-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      border: 2px solid #eee;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sabor-item:hover {
      border-color: #000;
    }

    .sabor-item.selecionado {
      border-color: #000;
      background: #f8f8f8;
    }

    .sabor-item .sabor-info {
      flex: 1;
    }

    .sabor-item .sabor-nome {
      font-weight: 600;
      font-size: 14px;
    }

    .sabor-item .sabor-desc {
      font-size: 12px;
      color: #666;
      margin-top: 3px;
    }

    .sabor-item .sabor-preco {
      font-weight: bold;
      font-size: 14px;
      color: #000;
      margin-left: 10px;
    }

    .sabor-check {
      width: 20px;
      height: 20px;
      border: 2px solid #ccc;
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sabor-item.selecionado .sabor-check {
      background: #000;
      border-color: #000;
    }

    .sabor-item.selecionado .sabor-check::after {
      content: '✓';
      color: white;
      font-size: 12px;
    }

    .borda-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      border: 2px solid #eee;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .borda-item:hover {
      border-color: #000;
    }

    .borda-item.selecionado {
      border-color: #000;
      background: #f8f8f8;
    }

    .borda-check {
      width: 20px;
      height: 20px;
      border: 2px solid #ccc;
      border-radius: 4px;
      margin-right: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .borda-item.selecionado .borda-check {
      background: #000;
      border-color: #000;
    }

    .borda-item.selecionado .borda-check::after {
      content: '✓';
      color: white;
      font-size: 12px;
    }

    .modal-footer {
      padding: 15px 25px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
    }

    .preco-total {
      font-size: 18px;
      font-weight: bold;
    }

    .btn-confirmar {
      background: #000;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn-confirmar:hover {
      background: #333;
    }

    .btn-confirmar:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #carrinho-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1001;
    }

    #carrinho-icon {
      background-color: #ffffff;
      color: white;
      padding: 12px 16px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.3s;
      box-shadow: 0 0 8px rgba(0,0,0,0.2);
    }

    #carrinho-abinha {
      display: none;
      position: absolute;
      top: 50px;
      right: 0;
      background: white;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      width: 260px;
      box-shadow: 0 0 12px rgba(0,0,0,0.3);
    }

    #carrinho-container:hover #carrinho-abinha {
      display: block;
    }

    #carrinho-itens {
      max-height: 200px;
      overflow-y: auto;
      margin: 10px 0;
      font-size: 14px;
      list-style: none;
      padding: 0;
    }

    #carrinho-itens li {
      border-bottom: 1px solid #eee;
      padding: 5px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #btn-finalizar {
      width: 100%;
      padding: 10px;
      background-color: #000000;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-remover {
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
      cursor: pointer;
    }

    #produtos-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 25px;
    }
  </style>
</head>
<body>

  <header>
    <a class="btn-voltar" href="index.html">🔙 Voltar</a>
    <div class="titulo-header">Cardápio de Pizza</div>
  </header>

  <div id="produtos-container">
    <p style="text-align:center;padding:40px;color:#666;font-family:Poppins,sans-serif;grid-column:1/-1;">Carregando cardápio...</p>
  </div>

  <!-- Modal de Escolha de Sabor -->
  <div id="modal-sabor" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h2 id="modal-sabor-titulo">Pizza Grande 1 Sabor</h2>
          <p id="modal-sabor-subtitulo">Escolha o sabor da sua pizza:</p>
        </div>
        <span class="close" onclick="fecharModal('modal-sabor')">&times;</span>
      </div>
      <div class="modal-body">

        <!-- Opções dinâmicas do produto (se houver) -->
        <div id="modal-pizza-opcoes"></div>

        <div class="opcao-grupo">
          <div class="opcao-titulo">
            <span id="modal-sabor-label">Escolha o sabor:</span>
            <div class="contador-opcao" id="contador-sabor">0/1</div>
          </div>
          <div class="obrigatorio">Obrigatório</div>
          <div id="lista-sabores"></div>
        </div>

        <div class="opcao-grupo" id="grupo-borda">
          <div class="opcao-titulo">
            <span>Deseja borda recheada?</span>
            <div class="contador-opcao" id="contador-borda">0/1</div>
          </div>
          <div>Opcional</div>
          <div id="lista-bordas"></div>
        </div>

        <div class="opcao-grupo">
          <div class="opcao-titulo">
            <span>Alguma observação?</span>
          </div>
          <textarea id="observacoes-pizza" placeholder="Ex: Bem assado, menos sal..."
                    style="width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 5px; resize: vertical; min-height: 80px; font-family: 'Poppins', sans-serif; font-size: 14px;"></textarea>
        </div>

      </div>
      <div class="modal-footer">
        <div class="preco-total">Total: R$ <span id="preco-total-pizza">0.00</span></div>
        <button class="btn-confirmar" id="btn-confirmar-final" onclick="finalizarPedido()">Confirmar Pedido</button>
      </div>
    </div>
  </div>

  <div id="carrinho-container">
    <div id="carrinho-icon">🛒</div>
    <div id="carrinho-abinha">
      <strong>🛍️ Seu Carrinho</strong>
      <ul id="carrinho-itens"></ul>
      <p><strong>Total:</strong> R$ <span id="carrinho-total">0.00</span></p>
      <button id="btn-finalizar" onclick="window.location.href='carrinho.html'">Finalizar Pedido</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxDI4G-ODEtByxxf_9BzfEzW5QJPQjYP4sk8tO8mOT5skWRXk_BoFNq7smRVFZ6kmMK/exec';
    const CATEGORIA_ATUAL = 'Pizza';

    const PRODUTOS_FALLBACK = [
      { id: 1, nome: "Pizza Broto Salgada 1 Sabor", preco: 30.00, imagem: "pizza-broto-salgada.jpg", descricao: "Pizza 25cm - Escolha seu sabor salgado favorito" },
      { id: 2, nome: "Pizza Broto Doce 1 Sabor", preco: 30.00, imagem: "pizza-broto-doce.jpg", descricao: "Pizza 25cm - Escolha seu sabor doce favorito" },
      { id: 3, nome: "Pizza Grande 1 Sabor", preco: 51.00, imagem: "pizza-grande-1-sabor.jpg", descricao: "Satisfaça seu apetite com nossa Pizza Grande de 1 sabor" },
      { id: 4, nome: "Pizza Grande 2 Sabores", preco: 52.00, imagem: "pizza-grande-2-sabores.jpg", descricao: "Escolha 2 sabores diferentes para sua pizza grande" }
    ];

    async function carregarProdutos() {
      const container = document.getElementById('produtos-container');
      container.innerHTML = '<p style="text-align:center;padding:40px;color:#666;font-family:Poppins,sans-serif;grid-column:1/-1;">Carregando cardápio...</p>';
      try {
        const response = await fetch(SCRIPT_URL + '?acao=listarProdutos&_=' + Date.now());
        const resultado = await response.json();
        if (resultado.success && resultado.produtos && resultado.produtos.length > 0) {
          const filtrados = resultado.produtos.filter(p =>
            p.categoria === CATEGORIA_ATUAL &&
            p.ativo !== false && p.ativo !== 'false' && p.ativo !== 'NÃO' && p.ativo !== 'NAO'
          );
          if (filtrados.length > 0) {
            renderizarProdutos(filtrados);
            return;
          }
        }
      } catch (e) {
        console.warn('Erro ao carregar da planilha, usando fallback.', e);
      }
      renderizarProdutos(PRODUTOS_FALLBACK);
    }

    function getTipoPizza(nome) {
      if (/broto.*doce|doce.*broto/i.test(nome)) return 'doce';
      if (/broto/i.test(nome)) return 'broto';
      if (/grande.*2|2.*sabor/i.test(nome)) return 'grande-2';
      return 'grande-1';
    }

    function renderizarProdutos(produtos) {
      const container = document.getElementById('produtos-container');
      container.innerHTML = '';
      produtos.forEach(prod => {
        const imagem = prod.imagem && prod.imagem.trim() ? prod.imagem : 'pizza.jpg';
        const preco = parseFloat(prod.preco || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const tipo = getTipoPizza(prod.nome);
        const div = document.createElement('div');
        div.className = 'produto';
        div.innerHTML = `
          <img src="${imagem}" alt="${prod.nome}" onerror="this.src='pizza.jpg'">
          <h3>${prod.nome}</h3>
          <p>${prod.descricao || ''}</p>
          <div class="preco">A partir de ${preco}</div>
          <button>Personalizar e Adicionar</button>
        `;
        div.querySelector('button').addEventListener('click', function() { abrirModalSabor(tipo, prod.opcoes || ''); });
        container.appendChild(div);
      });
    }

    // ===== SABORES HARDCODED (fallback) =====
    const saboresBroto = [
      { nome: "4 Queijos - BROTO", preco: 37.00, descricao: "Molho especial, queijo mussarela, queijo prato, queijo provolone, queijo parmesão, azeitona e orégano." },
      { nome: "Calabresa - BROTO", preco: 30.00, descricao: "Molho especial, mussarela, calabresa e cebola." },
      { nome: "Frango c/ Requeijão - BROTO", preco: 32.00, descricao: "Molho especial, mussarela, frango desfiado e requeijão." },
      { nome: "Margherita - BROTO", preco: 30.00, descricao: "Molho especial, mussarela, tomate e manjericão." },
      { nome: "Portuguesa - BROTO", preco: 32.00, descricao: "Molho especial, mussarela, presunto, ovo, cebola, azeitona e orégano." },
      { nome: "Pepperoni - BROTO", preco: 35.00, descricao: "Molho especial, mussarela e pepperoni." }
    ];

    const saboresDoce = [
      { nome: "Brigadeiro - BROTO DOCE", preco: 35.00, descricao: "Chocolate ao leite, confeitos coloridos e granulado de chocolate." },
      { nome: "Prestígio - BROTO DOCE", preco: 35.00, descricao: "Chocolate ao leite, coco ralado e leite condensado." },
      { nome: "Romeu e Julieta - BROTO DOCE", preco: 35.00, descricao: "Requeijão cremoso e goiabada." },
      { nome: "Nutella - BROTO DOCE", preco: 38.00, descricao: "Nutella e morangos frescos." }
    ];

    const saboresGrande1 = [
      { nome: "4 Queijos", preco: 57.00, descricao: "Molho especial, queijo mussarela, queijo prato, queijo provolone, queijo parmesão, azeitona e orégano." },
      { nome: "Calabresa", preco: 51.00, descricao: "Molho especial, mussarela, calabresa e cebola." },
      { nome: "Frango c/ Requeijão", preco: 53.00, descricao: "Molho especial, mussarela, frango desfiado e requeijão." },
      { nome: "Margherita", preco: 51.00, descricao: "Molho especial, mussarela, tomate e manjericão." },
      { nome: "Portuguesa", preco: 53.00, descricao: "Molho especial, mussarela, presunto, ovo, cebola, azeitona e orégano." },
      { nome: "Pepperoni", preco: 56.00, descricao: "Molho especial, mussarela e pepperoni." },
      { nome: "Frango c/ Cheddar", preco: 55.00, descricao: "Molho especial, mussarela, frango desfiado e cheddar." },
      { nome: "Mussarela", preco: 51.00, descricao: "Molho especial, mussarela, tomate e orégano." }
    ];

    const saboresGrande2 = [
      { nome: "4 Queijos - 1/2", preco: 57.00, descricao: "Mussarela, prato, provolone, parmesão, azeitona e orégano." },
      { nome: "Calabresa - 1/2", preco: 51.00, descricao: "Mussarela, calabresa e cebola." },
      { nome: "Frango c/ Requeijão - 1/2", preco: 53.00, descricao: "Mussarela, frango desfiado e requeijão." },
      { nome: "Margherita - 1/2", preco: 51.00, descricao: "Mussarela, tomate e manjericão." },
      { nome: "Portuguesa - 1/2", preco: 53.00, descricao: "Mussarela, presunto, ovo, cebola, azeitona e orégano." },
      { nome: "Pepperoni - 1/2", preco: 56.00, descricao: "Mussarela e pepperoni." },
      { nome: "Frango c/ Cheddar - 1/2", preco: 55.00, descricao: "Mussarela, frango desfiado e cheddar." },
      { nome: "Mussarela - 1/2", preco: 51.00, descricao: "Mussarela, tomate e orégano." }
    ];

    const bordas = [
      { nome: "Sem Borda Recheada", preco: 0 },
      { nome: "Borda de Catupiry", preco: 15.00 },
      { nome: "Borda de Cheddar", preco: 15.00 },
      { nome: "Borda de Chocolate", preco: 15.00 },
      { nome: "Borda Frango com Requeijão", preco: 18.00 }
    ];

    // Variáveis globais para controlar o estado
    let pizzaTipoAtual = null;
    let saborSelecionadoIndex = null;
    let saboresSelecionadosMultiplos = [];
    let bordaSelecionadaIndex = null;

    // Sabores carregados dinamicamente da planilha
    // Estrutura: { broto: [...], doce: [...], 'grande-1': [...], 'grande-2': [...] }
    let saboresDinamicosPorTipo = null;

    async function carregarSaboresDinamicos() {
      try {
        const response = await fetch(SCRIPT_URL + '?acao=listarSaboresPizza&_=' + Date.now());
        const resultado = await response.json();
        if (resultado.success && resultado.sabores && resultado.sabores.length > 0) {
          // Se o backend tiver endpoint listarSaboresPizza
          saboresDinamicosPorTipo = { todos: resultado.sabores };
          return;
        }
      } catch (e) {
        // sem endpoint dedicado - ok, não faz nada
      }

      // Tenta carregar da lista de produtos com categoria 'Sabor' ou 'Sabor Pizza'
      try {
        const response = await fetch(SCRIPT_URL + '?acao=listarProdutos&_=' + Date.now());
        const resultado = await response.json();
        if (resultado.success && resultado.produtos) {
          const sabores = resultado.produtos.filter(p =>
            (p.categoria === 'Sabor' || p.categoria === 'Sabor Pizza' || p.categoria === 'SaborPizza') &&
            p.ativo !== false && p.ativo !== 'false'
          );
          if (sabores.length > 0) {
            saboresDinamicosPorTipo = { todos: sabores.map(p => ({ nome: p.nome, preco: parseFloat(p.preco) || 0, descricao: p.descricao || '' })) };
          }
        }
      } catch (e) {
        console.warn('Usando sabores hardcoded como fallback.', e);
      }
      // Se não achou nada, saboresDinamicosPorTipo permanece null -> usa hardcoded
    }

    function getSaboresParaTipo(tipo) {
      // Se não tem dados dinâmicos, usa hardcoded direto
      if (!saboresDinamicosPorTipo) {
        return getSaboresHardcoded(tipo);
      }

      const todos = saboresDinamicosPorTipo.todos || [];
      if (todos.length === 0) return getSaboresHardcoded(tipo);

      // Tenta filtrar por tipo com base no nome
      let filtrados = [];
      if (tipo === 'broto') {
        filtrados = todos.filter(s => /broto/i.test(s.nome));
      } else if (tipo === 'doce') {
        filtrados = todos.filter(s => /doce|brigadeiro|prestígio|sonho|ouro|dois amores|sensação/i.test(s.nome));
      } else if (tipo === 'grande-2') {
        filtrados = todos.filter(s => /1\/2|dois sabores/i.test(s.nome));
      } else if (tipo === 'grande-1') {
        filtrados = todos.filter(s => !/broto|doce|1\/2/i.test(s.nome));
      }

      // Se o filtro retornou resultados, usa eles
      if (filtrados.length > 0) return filtrados;

      // Se filtro vazio mas temos lista geral, usa tudo (melhor que vazio)
      if (todos.length > 0) return todos;

      // Último recurso: hardcoded
      return getSaboresHardcoded(tipo);
    }

    function getSaboresHardcoded(tipo) {
      switch(tipo) {
        case 'broto': return saboresBroto;
        case 'doce': return saboresDoce;
        case 'grande-2': return saboresGrande2;
        case 'grande-1':
        default: return saboresGrande1;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      atualizarAbinhaCarrinho();
      carregarSaboresDinamicos();
      carregarProdutos();
    });

    function fecharModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    let opcoesPizzaAtual = '';

    function abrirModalSabor(tipo, opcoes) {
      pizzaTipoAtual = tipo;
      opcoesPizzaAtual = opcoes || '';
      saborSelecionadoIndex = null;
      saboresSelecionadosMultiplos = [];
      bordaSelecionadaIndex = null;

      const obsField = document.getElementById('observacoes-pizza');
      if (obsField) obsField.value = '';

      const titulos = {
        'broto': 'Pizza Broto Salgada 1 Sabor',
        'doce': 'Pizza Broto Doce 1 Sabor',
        'grande-1': 'Pizza Grande 1 Sabor',
        'grande-2': 'Pizza Grande 2 Sabores'
      };

      document.getElementById('modal-sabor-titulo').textContent = titulos[tipo];

      const subtitulos = {
        'broto': 'Escolha o seu sabor de pizza broto',
        'doce': 'Escolha o sabor de sua pizza doce:',
        'grande-1': 'Escolha o sabor da sua pizza:',
        'grande-2': 'Escolha os 2 sabores da sua pizza: '
      };

      document.getElementById('modal-sabor-subtitulo').textContent = subtitulos[tipo];

      // Opções dinâmicas do produto
      const opcoesContainer = document.getElementById('modal-pizza-opcoes');
      if (opcoesPizzaAtual) {
        const linhas = opcoesPizzaAtual.split('\n').map(l => l.trim()).filter(l => l);
        let optsHtml = linhas.map(l => `<option value="${l}">${l}</option>`).join('');
        opcoesContainer.innerHTML = `
          <div class="opcao-grupo">
            <label style="font-weight:600;color:#555;display:block;margin-bottom:5px;">Opções do Produto:</label>
            <select id="modal-pizza-opcao-select" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-family:'Poppins',sans-serif;margin-bottom:15px;">
              <option value="">Selecione uma opção</option>${optsHtml}
            </select>
          </div>`;
      } else {
        opcoesContainer.innerHTML = '';
      }

      // Contador
      const maxSabores = tipo === 'grande-2' ? 2 : 1;
      document.getElementById('contador-sabor').textContent = `0/${maxSabores}`;
      document.getElementById('modal-sabor-label').textContent = tipo === 'grande-2' ? 'Escolha 2 sabores:' : 'Escolha o sabor:';

      // Renderiza sabores
      const sabores = getSaboresParaTipo(tipo);
      const listaSabores = document.getElementById('lista-sabores');
      listaSabores.innerHTML = '';

      sabores.forEach((sabor, index) => {
        const item = document.createElement('div');
        item.className = 'sabor-item';
        item.innerHTML = `
          <div class="sabor-check"></div>
          <div class="sabor-info">
            <div class="sabor-nome">${sabor.nome}</div>
            ${sabor.descricao ? `<div class="sabor-desc">${sabor.descricao}</div>` : ''}
          </div>
          <div class="sabor-preco">${sabor.preco > 0 ? 'R$ ' + sabor.preco.toFixed(2).replace('.', ',') : ''}</div>
        `;
        item.addEventListener('click', function() { selecionarSabor(index, maxSabores); });
        listaSabores.appendChild(item);
      });

      // Renderiza bordas
      const listaBordas = document.getElementById('lista-bordas');
      listaBordas.innerHTML = '';
      bordas.forEach((borda, index) => {
        const item = document.createElement('div');
        item.className = 'borda-item';
        item.innerHTML = `
          <div class="borda-check"></div>
          <span style="flex:1;">${borda.nome}</span>
          <span style="font-weight:bold;">${borda.preco > 0 ? '+ R$ ' + borda.preco.toFixed(2).replace('.', ',') : 'Grátis'}</span>
        `;
        item.addEventListener('click', function() { selecionarBorda(index); });
        listaBordas.appendChild(item);
      });

      // Botão desabilitado até selecionar sabor
      document.getElementById('btn-confirmar-final').disabled = true;
      atualizarPrecoTotal();

      document.getElementById('modal-sabor').style.display = 'block';
    }

    function selecionarSabor(index, maxSabores) {
      const items = document.querySelectorAll('#lista-sabores .sabor-item');
      if (maxSabores === 1) {
        saborSelecionadoIndex = index;
        items.forEach((el, i) => el.classList.toggle('selecionado', i === index));
        document.getElementById('contador-sabor').textContent = `1/1`;
      } else {
        const pos = saboresSelecionadosMultiplos.indexOf(index);
        if (pos >= 0) {
          saboresSelecionadosMultiplos.splice(pos, 1);
          items[index].classList.remove('selecionado');
        } else if (saboresSelecionadosMultiplos.length < maxSabores) {
          saboresSelecionadosMultiplos.push(index);
          items[index].classList.add('selecionado');
        }
        document.getElementById('contador-sabor').textContent = `${saboresSelecionadosMultiplos.length}/${maxSabores}`;
        saborSelecionadoIndex = saboresSelecionadosMultiplos.length > 0 ? saboresSelecionadosMultiplos[0] : null;
      }

      const selecionouSabor = maxSabores === 1 ? saborSelecionadoIndex !== null : saboresSelecionadosMultiplos.length === maxSabores;
      document.getElementById('btn-confirmar-final').disabled = !selecionouSabor;
      atualizarPrecoTotal();
    }

    function selecionarBorda(index) {
      bordaSelecionadaIndex = index;
      document.querySelectorAll('#lista-bordas .borda-item').forEach((el, i) => {
        el.classList.toggle('selecionado', i === index);
      });
      document.getElementById('contador-borda').textContent = `1/1`;
      atualizarPrecoTotal();
    }

    function atualizarPrecoTotal() {
      const sabores = getSaboresParaTipo(pizzaTipoAtual);
      let total = 0;
      const maxSabores = pizzaTipoAtual === 'grande-2' ? 2 : 1;

      if (maxSabores === 1 && saborSelecionadoIndex !== null && sabores[saborSelecionadoIndex]) {
        total = sabores[saborSelecionadoIndex].preco;
      } else if (maxSabores > 1 && saboresSelecionadosMultiplos.length > 0) {
        const precos = saboresSelecionadosMultiplos.map(i => sabores[i] ? sabores[i].preco : 0);
        total = Math.max(...precos);
      }

      if (bordaSelecionadaIndex !== null && bordas[bordaSelecionadaIndex]) {
        total += bordas[bordaSelecionadaIndex].preco;
      }

      document.getElementById('preco-total-pizza').textContent = total.toFixed(2).replace('.', ',');
    }

    function finalizarPedido() {
      const sabores = getSaboresParaTipo(pizzaTipoAtual);
      const maxSabores = pizzaTipoAtual === 'grande-2' ? 2 : 1;

      let nomesFinal = [];
      let precoFinal = 0;

      if (maxSabores === 1) {
        if (saborSelecionadoIndex === null) { alert('Por favor, escolha um sabor!'); return; }
        const s = sabores[saborSelecionadoIndex];
        nomesFinal = [s.nome];
        precoFinal = s.preco;
      } else {
        if (saboresSelecionadosMultiplos.length < maxSabores) { alert(`Por favor, escolha ${maxSabores} sabores!`); return; }
        const precos = saboresSelecionadosMultiplos.map(i => sabores[i].preco);
        precoFinal = Math.max(...precos);
        nomesFinal = saboresSelecionadosMultiplos.map(i => sabores[i].nome);
      }

      let bordaTexto = '';
      if (bordaSelecionadaIndex !== null && bordas[bordaSelecionadaIndex]) {
        const borda = bordas[bordaSelecionadaIndex];
        if (borda.preco > 0) {
          precoFinal += borda.preco;
          bordaTexto = ` + ${borda.nome}`;
        }
      }

      const opcoesSelect = document.getElementById('modal-pizza-opcao-select');
      const opcaoSelecionada = opcoesSelect ? opcoesSelect.value : '';
      const obs = document.getElementById('observacoes-pizza').value.trim();

      let nomePedido = nomesFinal.join(' + ') + bordaTexto;
      if (opcaoSelecionada) nomePedido = `${nomePedido} (${opcaoSelecionada})`;

      adicionarAoCarrinho(nomePedido, precoFinal, obs);
      fecharModal('modal-sabor');
      alert('Pizza adicionada ao carrinho!');
    }

    function adicionarAoCarrinho(nome, preco, observacao = '') {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const detalhes = observacao ? `Observações: ${observacao}` : '';
      const itemExistente = cart.find(item => item.name === nome && item.details === detalhes);
      if (itemExistente) {
        itemExistente.quantity += 1;
      } else {
        cart.push({ name: nome, price: preco, quantity: 1, details: detalhes });
      }
      localStorage.setItem("cart", JSON.stringify(cart));
      atualizarAbinhaCarrinho();
    }

    function atualizarAbinhaCarrinho() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const lista = document.getElementById("carrinho-itens");
      const totalSpan = document.getElementById("carrinho-total");
      lista.innerHTML = "";
      let total = 0;
      cart.forEach(item => {
        const li = document.createElement("li");
        const valorTotalItem = item.price * item.quantity;
        li.innerHTML = `
          ${item.name} - ${item.quantity} un - R$ ${valorTotalItem.toFixed(2)}
          <button class="btn-remover" onclick="removerUmaUnidade('${item.name.replace(/'/g, "\\'")}')">Remover</button>
        `;
        lista.appendChild(li);
        total += valorTotalItem;
      });
      totalSpan.textContent = total.toFixed(2);
    }

    function removerUmaUnidade(nome) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const itemExistente = cart.find(item => item.name === nome);
      if (itemExistente && itemExistente.quantity > 1) {
        itemExistente.quantity -= 1;
      } else {
        cart = cart.filter(item => item.name !== nome);
      }
      localStorage.setItem("cart", JSON.stringify(cart));
      atualizarAbinhaCarrinho();
    }

    setInterval(atualizarAbinhaCarrinho, 1000);
  </script>
